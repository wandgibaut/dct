; here you put all codelets that could run inside the node, even if it not ran on start
[internal_codelets]
sensory=sensory
perceptual=perceptual

; here you put all codelets that should be running. This codelets will be ran as the node starts
[active_codelets]
sensory=sensory
perceptual=perceptual

; this place is reserved for some relevant infomations about the node as if the should die and 
; the number of votes needed to kill in a democracy-like decision
[signals]
suicide_note=false
death_threshold=3

; if redis is true, the nodeMaster will run a redis instance inside the container with port = server port +1
; the other parameters configure redis persistence: --save <seconds> <changes> --dbfilename <dbfilename> --dir <dir>
; the default values for seconds and changes are 3600 and 1, respectively
[memory]
redis=false
seconds=3600
changes=1
dbfilename="memory.rdb"
dir="./storage"